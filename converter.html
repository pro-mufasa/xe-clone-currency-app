<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <title>Mufasa Converter - Full Converter</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
  
    body {
      background-color: gray;
      color: black;
      padding: 0;
      margin: 0;
      font-family: Arial, sans-serif;
      transition: background 0.3s, color 0.3s;
    }

    
    body.dark-mode {
      background-color: #1a1a1a !important;
      color: white !important;
    }

    nav { 
      background-color: green;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    nav button {
      padding: 8px 15px;
      border-radius: 5px;
      border: none;
      background: white;
      cursor: pointer;
    }

    nav a {
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    .converter-box {
      background-color: yellow;
      max-width: 400px;
      margin: 40px auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      color: black; 
    }

    
    body.dark-mode .converter-box {
      background-color: #333;
      color: white;
    }

    input, select, .convert-btn, .swap-btn {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .swap-btn { background: #444; color: white; cursor: pointer; }
    .convert-btn { background: #28a745; color: white; cursor: pointer; font-weight: bold; }

    .loading { display: none; text-align: center; margin-top: 10px; }
    #result { text-align: center; margin-top: 15px; font-weight: bold; }
  </style>
</head>

<body>

<nav>
    <button><a href="Home.html" class="lang-key" data-en="HOME" data-rw="AHABANZA" data-fr="ACCUEIL">HOME</a></button>
    <button><a href="Full Converter.html" class="lang-key" data-en="Full Converter" data-rw="Guhindura Byose" data-fr="Convertisseur">Full Converter</a></button>
    <button><a href="Currency Details.html" class="lang-key" data-en="Currency Details" data-rw="Ibiranga Amadovize" data-fr="Détails">Currency Details</a></button>
    <button><a href="History.html" class="lang-key" data-en="History" data-rw="Amateka" data-fr="Historique">History</a></button>
    <button><a href="Setting.html" class="lang-key" data-en="Setting" data-rw="Igenamiterere" data-fr="Paramètres">Setting</a></button>
</nav>

<div class="converter-box">
  <h2 class="lang-key" data-en="Currency Converter" data-rw="Ihindura-madovize" data-fr="Convertisseur de Devises">Currency Converter</h2>

  <input type="number" id="amount" placeholder="Enter amount">

  <label class="lang-key" data-en="From:" data-rw="Kuvura:" data-fr="De:">From:</label>
  <select id="from">
    <option value="USD">🇺🇸 USD</option>
    <option value="EUR">🇪🇺 EUR</option>
    <option value="GBP">🇬🇧 GBP</option>
    <option value="RWF">🇷🇼 RWF</option>
  </select>

  <button class="swap-btn lang-key" onclick="swapCurrencies()" data-en="⇄ Swap" data-rw="⇄ Hinduranya" data-fr="⇄ Inverser">⇄ Swap</button>

  <label class="lang-key" data-en="To:" data-rw="Kugera:" data-fr="À:">To:</label>
  <select id="to">
    <option value="RWF">🇷🇼 RWF</option>
    <option value="USD">🇺🇸 USD</option>
    <option value="EUR">🇪🇺 EUR</option>
    <option value="GBP">🇬🇧 GBP</option>
  </select>

  <button class="convert-btn lang-key" onclick="convert()" data-en="Convert" data-rw="Vunja" data-fr="Convertir">Convert</button>

  <div class="loading" id="loading">⏳ <span class="lang-key" data-en="Converting..." data-rw="Irikubara..." data-fr="Conversion...">Converting...</span></div>

  <h3 id="result"></h3>
</div>

<script>
const rates = { USD: 1, EUR: 0.92, GBP: 0.78, RWF: 1300 };

function convert() {
  const amount = document.getElementById("amount").value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const resultText = document.getElementById("result");
  const loader = document.getElementById("loading");

  if (!amount || amount <= 0) {
    const lang = localStorage.getItem("selectedLang") || "en";
    const msg = { en: "Please enter a valid amount", rw: "Andika umubare ukwiye", fr: "Entrez un montant valide" };
    alert(msg[lang]);
    return;
  }

  loader.style.display = "block";
  resultText.innerText = "";

  setTimeout(() => {
    const result = (amount / rates[from]) * rates[to];
    resultText.innerText = `${amount} ${from} = ${result.toFixed(2)} ${to}`;
    loader.style.display = "none";
    saveHistory(`${amount} ${from} → ${result.toFixed(2)} ${to}`);
  }, 800);
}

function swapCurrencies() {
  const from = document.getElementById("from");
  const to = document.getElementById("to");
  let temp = from.value;
  from.value = to.value;
  to.value = temp;
}

function saveHistory(entry) {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(entry);
  localStorage.setItem("history", JSON.stringify(history));
}

function applySettings() {
   
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }

  
    const lang = localStorage.getItem("selectedLang") || "en";
    const elements = document.querySelectorAll('.lang-key');
    elements.forEach(el => {
        const translation = el.getAttribute(`data-${lang}`);
        if (translation) {
            el.innerText = translation;
        }
    });

  
    const amountInput = document.getElementById("amount");
    const placeholders = { en: "Enter amount", rw: "Andika umubare", fr: "Entrez le montant" };
    amountInput.placeholder = placeholders[lang];
}

window.onload = applySettings;
</script>

</body>
</html>
